<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surpresa</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      font-family: 'Lato', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow-x: hidden;
    }

    .secret-page {
      width: 100%;
      max-width: 1100px;
      text-align: center;
      position: relative;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 5rem);
      color: #f0d89e;
      margin-bottom: 18px;
      letter-spacing: 3px;
    }

    .subtitle {
      color: #d5d5d5;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 50px;
    }

    .photo-area {
      position: relative;
      display: inline-block;
    }

    .main-photo {
      width: min(85vw, 620px);
      max-height: 75vh;
      object-fit: cover;
      object-position: center;
      border-radius: 18px;
      border: 3px solid rgba(240, 216, 158, 0.5);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      display: block;
    }

    .arrow-text {
      position: absolute;
      top: 45%;
      right: -250px;
      transform: translateY(-50%);
      width: 220px;
      text-align: left;
      color: #f0d89e;
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      line-height: 1.3;
    }

    .arrow {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 8px;
      transform: rotate(180deg);
      display: inline-block;
    }

    .message {
      margin-top: 35px;
      font-size: 1.05rem;
      color: #ddd;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.8;
    }

    .back-link {
      display: inline-block;
      margin-top: 35px;
      color: #f0d89e;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
      transition: opacity 0.2s ease;
    }

    .back-link:hover {
      opacity: 1;
    }

    @media (max-width: 1000px) {
      .arrow-text {
        position: static;
        transform: none;
        width: auto;
        text-align: center;
        margin-top: 28px;
      }

      .arrow {
        transform: rotate(-90deg);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 20px;
      }

      .subtitle {
        margin-bottom: 35px;
      }

      .main-photo {
        width: 100%;
        max-height: 65vh;
      }

      .arrow-text {
        font-size: 1.2rem;
      }

      .arrow {
        font-size: 4rem;
      }
    }
  </style>
</head>

<body>

  <main class="secret-page">
    <h1>😭</h1>

    <div class="photo-area">
      <img src="images/secret.jpeg" alt="Foto especial" class="main-photo" />

      <div class="arrow-text">
        <div class="arrow">➜</div>
        <p>Chinchila</p>
      </div>
    </div>

    <p class="message">
        Amo-te mais que tudo
    </p>

    <a href="index.html" class="back-link">Voltar</a>
  </main>

</body>
</html>
